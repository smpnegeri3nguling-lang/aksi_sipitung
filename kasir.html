<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir QR Independent</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f0f0; }
        #reader { width: 100%; max-width: 400px; margin: auto; border-radius: 10px; overflow: hidden; }
        .box { background: white; padding: 20px; border-radius: 10px; margin-top: 20px; display: none; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Kasir QR Scanner</h2>
    <div id="reader"></div>
    
    <div id="result-box" class="box">
        <p><b>ID:</b> <span id="disp-id"></span></p>
        <p><b>Barang:</b> <span id="disp-nama"></span></p>
        <p><b>Harga:</b> Rp<span id="disp-harga"></span></p>
        <button id="btn-simpan" onclick="simpanKeGoogle()">SIMPAN TRANSAKSI</button>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzJg0KTdcaryazbKtOeMytnl4Vctr5CNJGjCTsifL5VIuxU7JZXMhHtbJtgMBhsCI9I7w/exec"; // GANTI INI!
        let currentData = {};

        const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        scanner.render(onScanSuccess);

        function onScanSuccess(decodedText) {
            document.getElementById('result-box').style.display = 'none';
            
            // Ambil data barang dari Google Sheets (via doGet)
            fetch(`${WEB_APP_URL}?qrId=${decodedText}`)
            .then(res => res.json())
            .then(data => {
                if(data) {
                    currentData = { qrId: decodedText, nama: data.nama, harga: data.harga };
                    document.getElementById('disp-id').innerText = decodedText;
                    document.getElementById('disp-nama').innerText = data.nama;
                    document.getElementById('disp-harga').innerText = data.harga;
                    document.getElementById('result-box').style.display = 'block';
                } else {
                    alert("Barang tidak terdaftar!");
                }
            });
        }

        function simpanKeGoogle() {
            document.getElementById('btn-simpan').innerText = "Mengirim...";
            
            fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify(currentData)
            })
            .then(() => {
                alert("Berhasil disimpan!");
                location.reload(); // Refresh untuk scan baru
            });
        }
    </script>
</body>
</html>
